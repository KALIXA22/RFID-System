<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KALIZ | Sales Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Inter:wght@200;400;600&family=JetBrains+Mono:wght@100&display=swap" rel="stylesheet">

<style>

:root{
--accent:#4ecdc4;
--accent-soft:#2ab7a9;
--matte-black:#0b132b;
--border-white:rgba(197,214,255,0.14);
}

body{
font-family:'Inter',sans-serif;
background-color:var(--matte-black);
color:#e2e8f0;
background-image:url("https://www.transparenttextures.com/patterns/dark-matter.png");
}

/* typography */

.serif-display{
font-family:'Cormorant Garamond',serif;
font-weight:300;
}

.mono-elegant{
font-family:'JetBrains Mono',monospace;
letter-spacing:0.2em;
font-size:0.65rem;
}

/* card */

.museum-card{
background:rgba(255,255,255,0.01);
border:1px solid var(--border-white);
backdrop-filter:blur(6px);
}

/* inputs */

.input-field{
width:100%;
background:transparent;
border:none;
border-bottom:1px solid rgba(255,255,255,0.15);
padding:12px 0;
font-size:18px;
color:white;
transition:all .35s ease;
font-family:'Cormorant Garamond',serif;
}

.input-field:focus{
outline:none;
border-bottom:1px solid var(--accent-soft);
}

/* button */

.btn-classic{
border:1px solid var(--accent-soft);
color:var(--accent-soft);
transition:all .4s ease;
background:transparent;
}

.btn-classic:hover{
background:var(--accent-soft);
color:#04131b;
box-shadow:0 0 20px rgba(24,169,153,0.28);
}

</style>
</head>


<body class="min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md">

<header class="text-center mb-10">

<h1 class="serif-display text-4xl tracking-widest text-white uppercase">
Sales Portal
</h1>

<p class="mono-elegant text-gray-500 mt-2">
PAYMENT_OPERATIONS
</p>

</header>


<main class="museum-card p-10 rounded-sm">

<form method="POST" action="/login/sales" class="space-y-8">

<div>

<label for="sales-username"
class="mono-elegant text-gray-500 block mb-4 uppercase">
Salesperson ID
</label>

<input
type="text"
id="sales-username"
name="username"
value="sales"
required
class="input-field">

</div>


<div>

<label for="sales-password"
class="mono-elegant text-gray-500 block mb-4 uppercase">
Password
</label>

<input
type="password"
id="sales-password"
name="password"
value="salespass"
required
class="input-field">

</div>


<div class="pt-6">

<button
type="submit"
class="w-full btn-classic py-4 serif-display italic text-xl tracking-widest">

Process Transaction

</button>

</div>

</form>

</main>

</div>

</body>
</html>
