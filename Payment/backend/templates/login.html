<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KALIZ | Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;500;700&family=Poppins:wght@300;400;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">

<style>

:root{
--accent:#4ecdc4;
--accent-soft:#2ab7a9;
--charcoal:#0b132b;
--border-white:rgba(197,214,255,0.14);
}

body{
font-family:'Poppins',sans-serif;
background-color:var(--charcoal);
color:#e2e8f0;
background-image:url("https://www.transparenttextures.com/patterns/dark-matter.png");
background-attachment:fixed;
}

.serif-display{
font-family:'Playfair Display',serif;
font-weight:400;
}

.mono-elegant{
font-family:'Space Mono',monospace;
letter-spacing:.18em;
font-size:.7rem;
}

.museum-card{
background:rgba(255,255,255,0.02);
border:1px solid var(--border-white);
transition:.45s cubic-bezier(.16,1,.3,1);
backdrop-filter:blur(8px);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.museum-card:hover{
border-color:var(--accent-soft);
background:rgba(78,205,196,0.08);
}

.btn-classic{
border:1px solid var(--accent-soft);
color:var(--accent-soft);
transition:.4s ease;
background:transparent;
text-transform:uppercase;
letter-spacing:.15em;
}

.btn-classic:hover{
background:var(--accent-soft);
color:#051217;
box-shadow:0 0 22px rgba(42,183,169,.35);
}

.input-luxe:focus{
outline:none;
border-color:var(--accent-soft);
box-shadow:0 6px 18px rgba(42,183,169,.2);
}

</style>
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-16">

<!-- Agent Login -->

<div class="w-full">

<header class="text-center mb-10">

<h1 class="serif-display text-4xl tracking-widest text-white uppercase">
Agent Portal
</h1>

<p class="mono-elegant text-gray-500 mt-2">
TOP-UP_OPERATIONS
</p>

</header>

<main class="museum-card p-10 rounded-sm">

<form method="POST" action="/login/agent" class="space-y-8">

<div>

<label for="agent-username" class="mono-elegant text-gray-500 block mb-4 uppercase">
Agent ID
</label>

<input
type="text"
id="agent-username"
name="username"
value="agent"
required
class="input-luxe w-full bg-transparent border-b border-white/10 py-3 text-lg serif-display text-white transition-all"
/>

</div>

<div>

<label for="agent-password" class="mono-elegant text-gray-500 block mb-4 uppercase">
Password
</label>

<input
type="password"
id="agent-password"
name="password"
value="agentpass"
required
class="input-luxe w-full bg-transparent border-b border-white/10 py-3 text-lg serif-display text-white transition-all"
/>

</div>

<div class="pt-6">

<button
type="submit"
class="w-full btn-classic py-4 serif-display italic text-xl tracking-widest">

Authenticate

</button>

</div>

</form>

</main>

</div>

<!-- Sales Login -->

<div class="w-full">

<header class="text-center mb-10">

<h1 class="serif-display text-4xl tracking-widest text-white uppercase">
Sales Portal
</h1>

<p class="mono-elegant text-gray-500 mt-2">
PAYMENT_OPERATIONS
</p>

</header>

<main class="museum-card p-10 rounded-sm">

<form method="POST" action="/login/sales" class="space-y-8">

<div>

<label for="sales-username" class="mono-elegant text-gray-500 block mb-4 uppercase">
Salesperson ID
</label>

<input
type="text"
id="sales-username"
name="username"
value="sales"
required
class="input-luxe w-full bg-transparent border-b border-white/10 py-3 text-lg serif-display text-white transition-all"
/>

</div>

<div>

<label for="sales-password" class="mono-elegant text-gray-500 block mb-4 uppercase">
Password
</label>

<input
type="password"
id="sales-password"
name="password"
value="salespass"
required
class="input-luxe w-full bg-transparent border-b border-white/10 py-3 text-lg serif-display text-white transition-all"
/>

</div>

<div class="pt-6">

<button
type="submit"
class="w-full btn-classic py-4 serif-display italic text-xl tracking-widest">

Process Transaction

</button>

</div>

</form>

</main>

</div>

</div>

</body>
</html>
